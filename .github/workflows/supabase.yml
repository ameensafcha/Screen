name: Supabase Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. OFFICIAL SUPABASE CLI SETUP ACTION
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # 2. PUSH MIGRATIONS (Ab command not found nahi aayega)
      - name: Deploy Database Migrations
        run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --db-password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}